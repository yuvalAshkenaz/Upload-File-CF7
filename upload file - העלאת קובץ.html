<!DOCTYPE HTML>
<html lang="he-IL" dir="rtl">
<head>
<meta charset="UTF-8">
<title>העלאת קובץ מעוצבת - Vanilla JS</title>
<style type="text/css">
/* DEMO */
body {
	font-family: system-ui, -apple-system, sans-serif;
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	background-color: #f8fafc;
	margin: 0;
}
/* DEMO */

.upload-container {
	position: relative;
	z-index: 1;
}
.upload-btn-wrap {
	background-color: #fff;
	display: inline-flex;
	width: 300px;
	max-width: 100%;
	align-items: center;
	gap: 12px;
	padding: 12px 24px;
	border: 2px dashed #cbd5e1;
	border-radius: 12px;
	cursor: pointer;
}
.upload-btn-wrap.active {
	border-style: solid;
	border-color: #22c55e;
	background-color: #f0fdf4;
}
.upload-btn-wrap.error {
	border-color: #ef4444;
	background-color: #fef2f2;
}
.file-input-val-text {
	font-size: 15px;
	color: #1e293b;
	font-weight: 500;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
}
.upload-icon {
	width: 20px;
	height: 20px;
	flex-shrink: 0;
	stroke: #64748b;
	transition: stroke 0.2s;
}
.upload-btn-wrap:hover .upload-icon path {
	stroke: #4f46e5;
}
.upload-btn-wrap.active .upload-icon path {
	stroke: #22c55e;
}
.delete-file {
	display: inline-flex;
	background: #ffeded;
	color: #ef4444;
	border: none;
	border-radius: 50%;
	width: 24px;
	height: 24px;
	font-size: 18px;
	line-height: 1;
	cursor: pointer;
	align-items: center;
	justify-content: center;
	margin-right: auto;
	z-index: 1;
	transition: all 0.2s;
}
.delete-file:hover {
	background: #ef4444;
	color: #ffeded;
}
.upload-container:not(.active) .delete-file {
	display: none;
}
.file-input {
	position: absolute;
	inset: 0;
	opacity: 0;
	cursor: pointer;
	width: 100%;
	height: 100%;
}
.file-input:focus-visible + .upload-btn-wrap {
	outline: 2px solid #000;
}
.error-tip {
	color: #ef4444;
	font-size: 13px;
	margin-top: 8px;
	display: block;
}
</style>
</head>
<body>

	<span class="upload-container">
		<input type="file" name="my-file" class="file-input">
		<!-- [file the-file filetypes:pdf|doc|docx|txt class:file-input] -->
		<span class="upload-btn-wrap">
			<svg class="upload-icon" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16V2M12 2L15 5M12 2L9 5M20 16V18C20 19.1046 19.1046 20 18 20H6C4.89543 20 4 19.1046 4 18V16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>
			<span class="file-input-val-text" data-default-text="בחר קובץ להעלאה...">בחר קובץ להעלאה...</span>
			<button type="button" class="delete-file" title="מחק קובץ">&times;</button>
		</span>
	</span>

    <script>
	// Upload File
	(() => {
		// פונקציה לאיפוס רכיב ספציפי
		function resetUploadUI(wrapper) {
			const fileInput = wrapper.querySelector('.file-input');
			const textDisplay = wrapper.querySelector('.file-input-val-text');
			const defaultText = textDisplay.getAttribute('data-default-text');
			
			if (fileInput) fileInput.value = '';
			textDisplay.textContent = defaultText;
			wrapper.classList.remove('active', 'error');
		}

		// ריצה על כל הכפתורים בדף
		document.querySelectorAll('.upload-container').forEach(wrapper => {
			const fileInput = wrapper.querySelector('.file-input');
			const textDisplay = wrapper.querySelector('.file-input-val-text');
			const deleteBtn = wrapper.querySelector('.delete-file');

			if (!fileInput) return;

			// האזנה לשינוי בקובץ
			fileInput.addEventListener('change', (e) => {
				if (e.target.files[0]) {
					textDisplay.textContent = e.target.files[0].name;
					wrapper.classList.add('active');
					wrapper.classList.remove('error');
				} else {
					resetUploadUI(wrapper);
				}
			});

			// כפתור מחיקה
			deleteBtn.addEventListener('click', (e) => {
				e.preventDefault();
				e.stopPropagation();
				resetUploadUI(wrapper);
			});
		});

		// איפוס גלובלי אחרי שליחת טופס מוצלחת של CF7
		document.addEventListener('wpcf7mailsent', () => {
			document.querySelectorAll('.upload-container').forEach(wrapper => {
				resetUploadUI(wrapper);
			});
		}, false);
	})();
    </script>

</body>
</html>
