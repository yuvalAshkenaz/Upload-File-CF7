<!DOCTYPE HTML>
<html lang="he-IL" dir="rtl">
<head>
<meta charset="UTF-8">
<title>העלאת קובץ מעוצבת - Vanilla JS</title>
<style type="text/css">
/* עיצוב כללי לגוף הדף (רק לצורך התצוגה) */
body {
	font-family: system-ui, -apple-system, sans-serif;
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	background-color: #f8fafc;
	margin: 0;
}

/* עטיפת הכפתור */
.upload-btn-wrap {
	position: relative;
	display: inline-flex;
	align-items: center;
	gap: 12px;
	padding: 12px 24px;
	background-color: #ffffff;
	border: 2px dashed #cbd5e1;
	border-radius: 12px;
	cursor: pointer;
	transition: all 0.2s ease;
	min-width: 280px;
}

/* מצב מעבר עכבר (Hover) */
.upload-btn-wrap:hover {
	border-color: #4f46e5;
	background-color: #f5f3ff;
}

/* כשהקובץ נבחר (מצב פעיל) */
.upload-btn-wrap.active {
	border-style: solid;
	border-color: #22c55e;
	background-color: #f0fdf4;
}

/* כשיש שגיאה */
.upload-btn-wrap.error {
	border-color: #ef4444;
	background-color: #fef2f2;
}

/* הטקסט של שם הקובץ */
.file-input-val-text {
	font-size: 15px;
	color: #1e293b;
	font-weight: 500;
	white-space: nowrap;
	overflow: hidden;
	text-overflow: ellipsis;
	max-width: 200px;
}

/* האייקון */
.upload-icon {
	width: 20px;
	height: 20px;
	fill: #64748b;
	transition: fill 0.2s;
}

.upload-btn-wrap:hover .upload-icon {
	fill: #4f46e5;
}

.upload-btn-wrap.active .upload-icon {
	fill: #22c55e;
}

/* כפתור מחיקה (X) */
.delete-file {
	display: none;
	background: #ffeded;
	color: #ef4444;
	border: none;
	border-radius: 50%;
	width: 24px;
	height: 24px;
	font-size: 18px;
	line-height: 1;
	cursor: pointer;
	align-items: center;
	justify-content: center;
	margin-right: auto;
	z-index: 1;
}

.upload-btn-wrap.active .delete-file {
	display: inline-flex;
}

/* הסתרת האינפוט המקורי כדי שהעיצוב שלנו ישלוט */
.file-input {
	position: absolute;
	inset: 0;
	opacity: 0;
	cursor: pointer;
	width: 100%;
	height: 100%;
}

/* הודעת שגיאה (Tip) */
.error-tip {
	color: #ef4444;
	font-size: 13px;
	margin-top: 8px;
	display: block;
}
</style>
</head>
<body>

    <div class="upload-container">
        <div class="upload-btn-wrap" id="uploadWrapper">
            <svg class="upload-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 16V2M12 2L15 5M12 2L9 5M20 16V18C20 19.1046 19.1046 20 18 20H6C4.89543 20 4 19.1046 4 18V16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
            <span class="file-input-val-text" data-default-text="בחר קובץ להעלאה...">בחר קובץ להעלאה...</span>
            
            <input type="file" name="my-file" class="file-input" id="fileInput">
            <!-- [file the-file filetypes:pdf|doc|docx|txt class:file-input] -->
			
            <button type="button" class="delete-file" title="מחק קובץ">&times;</button>
        </div>
        <div id="errorContainer"></div>
    </div>

    <script>
	// Upload File
	(() => {
		const wrapper = document.getElementById('uploadWrapper');
		const fileInput = document.getElementById('fileInput');
		const textDisplay = wrapper.querySelector('.file-input-val-text');
		const defaultText = textDisplay.getAttribute('data-default-text');

		// פונקציית איפוס ויזואלי
		function resetUploadUI() {
			fileInput.value = '';
			textDisplay.textContent = defaultText;
			wrapper.classList.remove('active', 'error');
		}

		// עדכון כשנבחר קובץ
		fileInput.addEventListener('change', (e) => {
			if (e.target.files[0]) {
				textDisplay.textContent = e.target.files[0].name;
				wrapper.classList.add('active');
				wrapper.classList.remove('error');
			} else {
				resetUploadUI();
			}
		});

		// כפתור מחיקה
		wrapper.querySelector('.delete-file').addEventListener('click', (e) => {
			e.preventDefault();
			e.stopPropagation();
			resetUploadUI();
		});

		// CF7: איפוס הכפתור אחרי שהטופס נשלח בהצלחה
		document.addEventListener('wpcf7mailsent', () => {
			resetUploadUI();
		}, false);
	})();
    </script>

</body>
</html>
